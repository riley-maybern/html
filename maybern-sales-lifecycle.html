<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Lifecycle — Maybern</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-green: #091D13;
      --dark-green: #092115;
      --green: #17412D;
      --mint: #ECFFF5;
      --light-mint: #F6FFFA;
      --primary: var(--deep-green);
      --primary-mid: var(--green);
      --text-light: var(--mint);
      --text-dark: var(--dark-green);
      --bg-light: var(--light-mint);
      --bg-tint: #E0F5EA;
      --border-light: #C8E6D5;
      --text-secondary: #444444;
      --text-muted: #666666;
      --text-faint: #888888;
      --green-status: #22C55E;
      --amber: #F59E0B;
      --red: #EF4444;
      --blue-accent: #3B82F6;
      --success-bg: #DCFCE7;
      --success-text: #166534;
      --warn-bg: #FEF3C7;
      --warn-text: #92400E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-dark);
      background: var(--bg-light);
      min-height: 100vh;
    }

    /* ── Top Nav ── */
    .topbar {
      background: var(--deep-green);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { display: flex; align-items: flex-end; gap: 3px; height: 22px; }
    .logo-icon .bar { width: 5px; border-radius: 2px 2px 0 0; background: var(--mint); }
    .logo-icon .bar:nth-child(1) { height: 8px; }
    .logo-icon .bar:nth-child(2) { height: 12px; }
    .logo-icon .bar:nth-child(3) { height: 16px; }
    .logo-icon .bar:nth-child(4) { height: 22px; }
    .logo-text { font-size: 18px; font-weight: 500; color: var(--mint); letter-spacing: 0.5px; }
    .topbar-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; color: var(--mint); opacity: 0.6; }

    /* ── Page Header ── */
    .page-header {
      background: var(--primary);
      color: var(--text-light);
      padding: 28px 32px 0 32px;
    }
    .page-header h1 { font-family: Georgia, serif; font-size: 26px; font-weight: 400; margin-bottom: 4px; }
    .page-header p { font-size: 13px; font-weight: 300; opacity: 0.7; margin-bottom: 20px; }

    /* ── Chevron Bar ── */
    .chevron-bar { display: flex; width: 100%; }
    .chevron {
      flex: 1;
      position: relative;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255,255,255,0.07);
      transition: all 0.2s ease;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      padding: 0 18px 0 26px;
    }
    .chevron:first-child { padding-left: 14px; }
    .chevron::after {
      content: '';
      position: absolute;
      right: -14px;
      top: 0;
      width: 0; height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-left: 14px solid rgba(255,255,255,0.07);
      z-index: 2;
      transition: all 0.2s ease;
    }
    .chevron::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 0; height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-left: 14px solid var(--primary);
      z-index: 1;
    }
    .chevron:first-child::before { display: none; }
    .chevron-content { display: flex; align-items: center; gap: 6px; z-index: 3; pointer-events: none; }
    .chevron-num { font-size: 10px; font-weight: 700; color: rgba(236,255,245,0.45); min-width: 14px; }
    .chevron-label { font-size: 10.5px; font-weight: 500; color: var(--mint); white-space: nowrap; letter-spacing: 0.3px; }

    .chevron.active { background: var(--green-status); }
    .chevron.active::after { border-left-color: var(--green-status); }
    .chevron.active .chevron-num { color: rgba(0,0,0,0.35); }
    .chevron.active .chevron-label { color: var(--deep-green); font-weight: 600; }
    .chevron:hover:not(.active) { background: rgba(255,255,255,0.14); }
    .chevron:hover:not(.active)::after { border-left-color: rgba(255,255,255,0.14); }

    /* ── Main Content ── */
    .main-content { max-width: 1100px; margin: 0 auto; padding: 36px 32px 60px; }

    /* ── Stage Header ── */
    .stage-header { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 28px; }
    .stage-number {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: var(--primary);
      color: var(--mint);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 300; flex-shrink: 0;
    }
    .stage-info h2 { font-size: 22px; font-weight: 300; color: var(--primary); margin-bottom: 2px; }
    .stage-info .stage-subtitle { font-size: 13px; font-weight: 400; color: var(--text-muted); }
    .stage-goal {
      margin-top: 10px; padding: 14px 18px;
      background: var(--bg-tint); border-radius: 8px; border-left: 3px solid var(--green-status);
    }
    .stage-goal-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; color: var(--primary-mid); margin-bottom: 4px; }
    .stage-goal p { font-size: 14px; font-weight: 400; color: var(--text-dark); line-height: 1.5; margin-bottom: 0; }

    /* ── Content Grid ── */
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--light-mint); border: 1px solid var(--border-light);
      border-radius: 10px; padding: 22px; transition: box-shadow 0.2s ease;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(9,33,21,0.06); }
    .card-icon {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px; font-size: 15px;
    }
    .card-icon.green { background: var(--bg-tint); }
    .card-icon.blue { background: #EBF5FF; }
    .card-icon.purple { background: #F3E8FF; }
    .card h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--primary-mid); margin-bottom: 12px; }
    .card ul { list-style: none; padding: 0; }
    .card li {
      font-size: 13px; font-weight: 300; color: var(--text-secondary);
      padding: 6px 0; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
    }
    .card li:last-child { border-bottom: none; }
    .card li .bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--green-status); flex-shrink: 0; margin-top: 7px; }

    /* ── Questions ── */
    .questions-section { margin-bottom: 28px; }
    .questions-section h3 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--primary-mid); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .questions-section h3::before { content: ''; width: 20px; height: 2px; background: var(--green-status); border-radius: 1px; }
    .question-card {
      background: var(--light-mint); border: 1px solid var(--border-light);
      border-radius: 10px; padding: 18px 22px; margin-bottom: 10px;
      position: relative; transition: all 0.2s ease;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .question-card:hover { border-color: var(--green-status); box-shadow: 0 2px 12px rgba(34,197,94,0.08); }
    .question-card.q-checked { border-color: var(--green-status); background: var(--success-bg); }
    .question-card .q-check {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border-light); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; margin-top: 18px; cursor: pointer;
    }
    .question-card .q-check:hover { border-color: var(--green-status); }
    .question-card.q-checked .q-check { background: var(--green-status); border-color: var(--green-status); }
    .question-card.q-checked .q-check::after { content: '\2713'; color: white; font-size: 12px; font-weight: 700; }
    .question-card .q-body { flex: 1; min-width: 0; }
    .question-card .q-tag { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; color: var(--green-status); margin-bottom: 4px; }
    .question-card p { font-size: 13.5px; font-weight: 400; color: var(--text-dark); line-height: 1.6; font-style: italic; margin-bottom: 0; cursor: pointer; }
    .question-card.q-checked p { color: var(--text-faint); }
    .question-card .copy-hint { position: absolute; top: 14px; right: 14px; font-size: 10px; color: var(--text-faint); opacity: 0; transition: opacity 0.2s; cursor: pointer; }
    .question-card:hover .copy-hint { opacity: 1; }
    .q-progress-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .q-progress-track { flex: 1; height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
    .q-progress-fill { height: 100%; background: var(--green-status); border-radius: 2px; transition: width 0.3s ease; }
    .q-progress-label { font-size: 11px; font-weight: 600; color: var(--green-status); white-space: nowrap; }
    .q-cat {
      display: inline-block; font-size: 8px; text-transform: uppercase;
      letter-spacing: 1.5px; font-weight: 700; padding: 2px 8px;
      border-radius: 3px; margin-right: 6px; vertical-align: middle;
    }
    .q-cat.discovery { background: var(--bg-tint); color: var(--green); }
    .q-cat.metrics { background: #EDE9FE; color: #5B21B6; }
    .q-cat.econ-buyer { background: #FEF3C7; color: #92400E; }
    .q-cat.decision-criteria { background: #DBEAFE; color: #1E40AF; }
    .q-cat.decision-process { background: #E0E7FF; color: #3730A3; }
    .q-cat.champion { background: #FCE7F3; color: #9D174D; }
    .q-cat.competition { background: #FEE2E2; color: #991B1B; }
    .q-cat.pricing { background: #F0FDF4; color: #166534; }
    .q-cat.paper-process { background: #F1F5F9; color: #475569; }

    /* ── Exit Criteria Gate ── */
    .exit-section { margin-bottom: 28px; }
    .exit-section h3 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--primary-mid); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .exit-section h3::before { content: ''; width: 20px; height: 2px; background: var(--amber); border-radius: 1px; }
    .gate-card { background: var(--light-mint); border: 1px solid var(--border-light); border-radius: 10px; overflow: hidden; }
    .gate-header {
      background: var(--primary); color: var(--mint); padding: 12px 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .gate-header .gate-icon { font-size: 13px; }
    .gate-header span { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
    .gate-progress { font-size: 11px; font-weight: 600; margin-left: auto; color: var(--green-status); }
    .gate-items { padding: 6px 18px; }
    .gate-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border-light);
      cursor: pointer; user-select: none;
    }
    .gate-item:last-child { border-bottom: none; }
    .gate-check {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border-light); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; margin-top: 1px;
    }
    .gate-item.checked .gate-check { background: var(--green-status); border-color: var(--green-status); }
    .gate-item.checked .gate-check::after { content: '\2713'; color: white; font-size: 12px; font-weight: 700; }
    .gate-item .gate-text { font-size: 13px; font-weight: 400; color: var(--text-secondary); line-height: 1.5; }
    .gate-item.checked .gate-text { text-decoration: line-through; color: var(--text-faint); }

    /* ── Bottom Row ── */
    .bottom-row { display: grid; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 900px) { .bottom-row { grid-template-columns: 1fr !important; } }
    .info-card {
      background: var(--light-mint); border: 1px solid var(--border-light);
      border-radius: 10px; padding: 22px;
    }
    .info-card h4 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--primary-mid); margin-bottom: 10px; }
    .info-card p, .info-card blockquote { font-size: 13px; font-weight: 300; color: var(--text-secondary); line-height: 1.6; }
    .info-card blockquote {
      border-left: 3px solid var(--green-status); padding-left: 14px;
      margin: 6px 0 0 0; font-style: italic; color: var(--text-dark); font-weight: 400;
    }
    .info-card.hw { border-top: 3px solid var(--amber); }
    .info-card.transition { border-top: 3px solid var(--blue-accent); }
    .info-card.example { border-top: 3px solid var(--green-status); }
    .hw-list { list-style: none; padding: 0; }
    .hw-list li {
      font-size: 13px; font-weight: 300; color: var(--text-secondary);
      padding: 5px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
    }
    .hw-list li::before { content: '\2192'; color: var(--amber); font-weight: 600; flex-shrink: 0; }

    /* ── Alert Banner ── */
    .alert-banner {
      background: var(--warn-bg); border: 1px solid #FCD34D; border-radius: 8px;
      padding: 12px 18px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 500; color: var(--warn-text);
    }

    /* ── Footer ── */
    .footer { text-align: center; padding: 28px; font-size: 11px; color: var(--text-faint); border-top: 1px solid var(--border-light); }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.35s ease-out forwards; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <span class="logo-text">maybern</span>
    </div>
    <span class="topbar-label">Sales Lifecycle v1.0 &middot; 2026</span>
  </div>

  <div class="page-header">
    <h1>Sales Lifecycle Enablement</h1>
    <p>Structured operating playbook — click a stage to view questions, gates, and coaching guidance</p>
    <div class="chevron-bar" id="chevronBar"></div>
  </div>

  <div class="main-content" id="stageContent"></div>

  <div class="footer">Confidential — Maybern &middot; Sales Lifecycle v1.0 &middot; March 2026</div>


<script>
const stages = [
  {
    num: 1, name: "Connectivity", subtitle: "Initial Demo / Positioning",
    goal: "Reframe the current calculation process and earn a deeper working session.",
    icps: ["Controller", "VP Finance", "CFO (if accessible)"],
    internalPrep: ["Fund size and number of vehicles", "Admin relationship", "Recent or upcoming fund launches", "Known Excel reliance", "Known audit or reconciliation friction"],
    priorContext: ["Any mention of reconciliation", "Any mention of shadow models", "Any mention of growth", "Any mention of side letters"],
    questions: [
      {text: "Before I assume this is relevant, can you walk me through how the flow of calculations works today from your GL through to your investor portal?", cat: "discovery"},
      {text: "How are you currently managing waterfall and fee calculations?", cat: "discovery"},
      {text: "How do you validate those calculations before numbers go out to investors?", cat: "discovery"},
      {text: "As you add funds, does the process stay consistent or require more customization each time?", cat: "discovery"},
      {text: "Have you explored other ways to solve this, or is this the first time you are looking externally?", cat: "competition"}
    ],
    exitCriteria: [
      "Client clearly states where waterfall and fee logic lives.",
      "Client confirms whether internal reconciliation occurs and how often.",
      "Client acknowledges that adding funds/vehicles increases calculation variants, overrides, or validation effort.",
      "Operational owner of the waterfall model is identified.",
      "Rep understands whether prospect is evaluating alternatives, building in-house, or expanding admin capabilities.",
      "Deep Discovery meeting is scheduled with the logic owner confirmed to attend."
    ],
    hw: ["Confirm waterfall logic owner will attend Deep Discovery.", "Be prepared to walk through one real distribution example."],
    transition: "Based on what you\u2019ve described, this isn\u2019t a surface-level reporting issue \u2014 it\u2019s about where the calculation logic lives and how it scales safely. The next step would be a focused working session to map that properly.",
    example: "They maintain waterfall logic internally in Excel. Reconciliation occurs quarterly. Each new vehicle introduces additional customization. Controller owns the model. Not evaluating alternatives yet. Deep Discovery scheduled with Controller.",
    alerts: []
  },
  {
    num: 2, name: "Opportunity Qualification", subtitle: "Deep Discovery + Value Framing + Early Coordination",
    goal: "Diagnose the calculation architecture. Quantify exposure. Dollarize the pain. Introduce investment range. Identify buying path and map the full decision process.",
    icps: ["Controller (required)", "CFO (strongly preferred)"],
    internalPrep: ["Discovery checklist", "ROI model", "Directional pricing range", "Stakeholder mapping template"],
    priorContext: ["Stated reconciliation hours", "Mentioned complexity", "Mentioned audit friction", "Mentioned growth plans"],
    questions: [
      {text: "Can you walk me through what actually happens when you run a distribution \u2014 from event to investor statement?", cat: "discovery"},
      {text: "Where does the fee and carry logic actually live today?", cat: "discovery"},
      {text: "Who is responsible for updating and maintaining the model?", cat: "discovery"},
      {text: "Do you reconcile your internal calculations against what the admin produces?", cat: "discovery"},
      {text: "If you had to estimate, how many hours per quarter go into maintaining or checking the waterfall logic?", cat: "metrics"},
      {text: "What does this reconciliation burden actually cost you annually?", cat: "metrics"},
      {text: "What is the exposure if a calculation error hits an LP?", cat: "metrics"},
      {text: "When an LP or auditor challenges this, who ultimately has to defend it?", cat: "discovery"},
      {text: "Who would need to approve a decision like this, and what does their process usually look like?", cat: "econ-buyer"},
      {text: "Beyond the technical piece, what else matters to you in making this decision?", cat: "decision-criteria"},
      {text: "Walk me through what the full evaluation and approval process looks like \u2014 procurement, legal review, budget cycles, approval thresholds?", cat: "decision-process"},
      {text: "If this made sense to you, would you be comfortable presenting it internally, and what would you need from us to make that easy?", cat: "champion"},
      {text: "To pressure-test this properly, we\u2019ll need to review sample waterfall language. Would that require an NDA?", cat: "decision-process"},
      {text: "Firms your size typically invest around X basis points for this layer. Is that within the realm of something you would evaluate seriously?", cat: "pricing"}
    ],
    exitCriteria: [
      "Rep can clearly describe full calculation flow.",
      "Client confirms where waterfall and fee logic lives.",
      "Client identifies who updates and maintains the model.",
      "Client quantifies reconciliation effort (frequency and hours).",
      "Client has dollarized the cost of reconciliation and/or LP error exposure.",
      "Client confirms reconciliation effort increases with additional funds or vehicles.",
      "Client identifies who ultimately defends calculations to LPs or auditors.",
      "Economic Buyer identified by name AND their approval process is understood.",
      "Client has articulated decision criteria beyond technical fit.",
      "Full decision process mapped \u2014 procurement, legal, budget cycles, approval thresholds.",
      "Champion identified and confirmed willing to advocate internally.",
      "Directional price range shared and client confirms it is within a reasonable range."
    ],
    hw: ["Confirm which budget category this would fall under.", "Confirm whether NDA is required for document sharing.", "Validate internally that the directional price range is viable."],
    transition: "If the range and return profile make sense directionally, the next step is structuring the evaluation properly with the right stakeholders.",
    example: "Waterfall logic lives in Excel internally. Reconciliation takes ~25 hours per fund per quarter at ~$150K annual burden. Side letters create manual overrides. Introduced 1 bps range \u2014 no shock. CFO identified as signer, approval goes through finance committee quarterly. Controller confirmed as champion, wants a one-pager for CFO. Moving to coordination.",
    alerts: ["\u26A0\uFE0F If CFO has not been looped in at this stage, advancement pauses."]
  },
  {
    num: 3, name: "File Review & Discovery", subtitle: "Document Collection + NDA Execution",
    goal: "Prepare for technical validation using real documents.",
    icps: ["Controller", "Admin contact"],
    internalPrep: ["NDA template ready", "Document checklist prepared", "Internal SME briefed", "Champion one-pager or internal deck prepared"],
    priorContext: ["Known waterfall tiers", "Known side letters", "Known admin export method"],
    questions: [
      {text: "Is there anything in your structure that tends to create calculation complexity?", cat: "discovery"},
      {text: "If this made sense to you, would you be comfortable presenting it internally, and what would you need from us to make that easy?", cat: "champion"}
    ],
    exitCriteria: [
      "NDA sent immediately after agreement to evaluate technically.",
      "NDA executed.",
      "LPA or governing waterfall language received.",
      "Sample distribution file received.",
      "Side letter examples received (if applicable).",
      "Champion is equipped with materials to sell internally (if not confirmed in Stage 2).",
      "Technical validation meeting scheduled with required attendees."
    ],
    hw: ["Execute NDA.", "Send LPA.", "Send sample distribution.", "Send side letter examples."],
    transition: "With documents in hand, the next step is validating this against your actual structure.",
    example: "NDA executed. LPA and distribution files received. Identified European catch-up and side letter overrides. Controller armed with one-pager for CFO. Technical validation scheduled.",
    alerts: ["\u26A0\uFE0F No NDA + no documents = no advancement."]
  },
  {
    num: 4, name: "Technical & Tailored Demo", subtitle: "Structural Feasibility Confirmation",
    goal: "Confirm structural feasibility.",
    icps: ["Controller", "Admin contact", "CFO (optional but preferred)"],
    internalPrep: ["Tailored demo configured", "Edge cases pre-built", "Integration flow mapped"],
    priorContext: ["Actual waterfall tiers", "Side letter logic", "Admin export format"],
    questions: [
      {text: "Are there non-standard waterfall tiers or catch-ups we should factor in?", cat: "discovery"},
      {text: "How do side letters affect your base waterfall today?", cat: "discovery"},
      {text: "In your case, would Maybern serve as the calculator or validation layer?", cat: "decision-criteria"},
      {text: "Do you see any structural reason this wouldn\u2019t work here?", cat: "discovery"}
    ],
    exitCriteria: [
      "Client confirms Maybern can replicate their actual waterfall tiers.",
      "Client confirms side letters and overrides can be supported.",
      "Admin data flow and integration method are clearly understood.",
      "No unresolved structural or integration blockers remain.",
      "Client explicitly states there is no technical reason the solution would not work.",
      "Implementation owner identified.",
      "Economic Alignment meeting scheduled with CFO confirmed."
    ],
    hw: ["Confirm CFO attendance at Economic Alignment.", "Confirm internal implementation owner.", "Confirm no internal technical objections remain."],
    transition: "Now that feasibility is confirmed, the remaining question is priority, budget, and timing.",
    example: "Validated Fund II waterfall including side letters. No structural blockers. Admin integration straightforward. Controller confirmed it would work. CFO meeting scheduled.",
    alerts: []
  },
  {
    num: 5, name: "Proposal", subtitle: "Economic Alignment + Investment Commitment",
    goal: "Convert validation into formal investment commitment.",
    icps: ["CFO", "Controller"],
    internalPrep: ["Final pricing", "Business case summary with dollarized ROI", "Implementation timeline"],
    priorContext: [],
    questions: [
      {text: "Is this a priority this fiscal period?", cat: "econ-buyer"},
      {text: "Where would this sit budget-wise?", cat: "econ-buyer"},
      {text: "If we align on terms, is there anything internally that would delay this?", cat: "decision-process"}
    ],
    exitCriteria: [
      "Proposal delivered.",
      "CFO confirms budget source.",
      "CFO confirms initiative priority.",
      "Verbal economic agreement provided.",
      "Legal and security review initiated."
    ],
    hw: ["Introduce legal contact.", "Introduce security contact.", "Confirm approval timeline."],
    transition: "With alignment on budget and timing, we can move into contract execution.",
    example: "CFO confirmed budget from finance systems allocation. Initiative prioritized before next fund launch. Legal and security review initiated.",
    alerts: []
  },
  {
    num: 6, name: "Verbal / Paper Process", subtitle: "Contract Execution",
    goal: "Execute the approved decision.",
    icps: [], internalPrep: [], priorContext: [],
    questions: [
      {text: "Is there anything in security or legal that could slow this down?", cat: "paper-process"},
      {text: "What signature timeline should we align around?", cat: "paper-process"}
    ],
    exitCriteria: [
      "Security review completed.",
      "Legal redlines resolved.",
      "Target signature date agreed.",
      "Implementation kickoff scheduled."
    ],
    hw: ["Assign legal owner.", "Assign implementation owner.", "Confirm signature date."],
    transition: "",
    example: "Security cleared with minor comments. Legal redlines minimal. Signature expected Friday. Implementation kickoff scheduled.",
    alerts: []
  },
  {
    num: 7, name: "Closed", subtitle: "Won \u2014 Handoff to Implementation",
    goal: "Finalize the deal and transition to delivery.",
    icps: [], internalPrep: [], priorContext: [],
    questions: [],
    exitCriteria: ["Contract signed.", "Internal handoff completed.", "Implementation kickoff confirmed."],
    hw: [], transition: "", example: "", alerts: []
  }
];

let activeStage = 0;
let checkedItems = {};
let checkedQuestions = {};
stages.forEach((_, i) => { checkedItems[i] = {}; checkedQuestions[i] = {}; });

var catLabels = {
  "discovery": "Discovery",
  "metrics": "Metrics",
  "econ-buyer": "Economic Buyer",
  "decision-criteria": "Decision Criteria",
  "decision-process": "Decision Process",
  "champion": "Champion",
  "competition": "Competition",
  "pricing": "Pricing",
  "paper-process": "Paper Process"
};

function buildChevrons() {
  const bar = document.getElementById('chevronBar');
  bar.innerHTML = '';
  stages.forEach((stage, i) => {
    const c = document.createElement('button');
    c.className = 'chevron' + (i === activeStage ? ' active' : '');
    c.onclick = () => setStage(i);
    c.innerHTML = '<div class="chevron-content"><span class="chevron-num">' + stage.num + '</span><span class="chevron-label">' + stage.name + '</span></div>';
    bar.appendChild(c);
  });
}

function getCheckedCount(idx) {
  return Object.values(checkedItems[idx] || {}).filter(Boolean).length;
}

function setStage(idx) { activeStage = idx; buildChevrons(); renderStage(); }

function toggleCheck(si, ci) {
  if (!checkedItems[si]) checkedItems[si] = {};
  checkedItems[si][ci] = !checkedItems[si][ci];
  renderStage();
}

function toggleQuestion(si, qi, evt) {
  evt.stopPropagation();
  if (!checkedQuestions[si]) checkedQuestions[si] = {};
  checkedQuestions[si][qi] = !checkedQuestions[si][qi];
  renderStage();
}

function getCheckedQCount(idx) {
  return Object.values(checkedQuestions[idx] || {}).filter(Boolean).length;
}

function copyQuestion(el, text, evt) {
  evt.stopPropagation();
  navigator.clipboard.writeText(text).then(() => {
    var hint = el.closest('.question-card').querySelector('.copy-hint');
    hint.textContent = '\u2713 Copied';
    hint.style.opacity = '1';
    hint.style.color = '#166534';
    setTimeout(() => { hint.textContent = 'Click to copy'; hint.style.opacity = ''; hint.style.color = ''; }, 1500);
  });
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function renderStage() {
  const s = stages[activeStage];
  const el = document.getElementById('stageContent');
  const checked = getCheckedCount(activeStage);
  const total = s.exitCriteria.length;
  let h = '';

  h += '<div class="stage-header animate-in"><div class="stage-number">' + s.num + '</div><div class="stage-info"><h2>' + s.name + '</h2><div class="stage-subtitle">' + s.subtitle + '</div></div></div>';
  h += '<div class="stage-goal animate-in delay-1"><div class="stage-goal-label">Stage Objective</div><p>' + s.goal + '</p></div>';

  s.alerts.forEach(a => { h += '<div class="alert-banner animate-in" style="margin-top:20px;">' + a + '</div>'; });

  if (s.icps.length || s.internalPrep.length) {
    h += '<div class="content-grid animate-in delay-2" style="margin-top:24px;">';
    if (s.icps.length) {
      h += '<div class="card"><div class="card-icon green">\uD83D\uDC64</div><h3>Target Personas</h3><ul>' + s.icps.map(i => '<li><span class="bullet"></span>' + i + '</li>').join('') + '</ul></div>';
    }
    if (s.internalPrep.length) {
      h += '<div class="card"><div class="card-icon blue">\uD83D\uDCCB</div><h3>Internal Prep</h3><ul>' + s.internalPrep.map(i => '<li><span class="bullet"></span>' + i + '</li>').join('') + '</ul></div>';
    }
    h += '</div>';
  }

  if (s.priorContext.length) {
    h += '<div class="card animate-in delay-3" style="margin-bottom:24px;"><div class="card-icon purple">\uD83D\uDD17</div><h3>Leverage From Prior Meeting</h3><ul>' + s.priorContext.map(i => '<li><span class="bullet"></span>' + i + '</li>').join('') + '</ul></div>';
  }

  if (s.questions.length) {
    var qChecked = getCheckedQCount(activeStage);
    var qTotal = s.questions.length;
    var qPct = Math.round((qChecked / qTotal) * 100);
    h += '<div class="questions-section animate-in delay-3"><h3>Required Questions to Advance</h3>';
    h += '<div class="q-progress-bar"><div class="q-progress-track"><div class="q-progress-fill" style="width:' + qPct + '%"></div></div><span class="q-progress-label">' + qChecked + '/' + qTotal + ' completed</span></div>';
    s.questions.forEach((q, qi) => {
      var qText = q.text;
      var qCat = q.cat;
      var qIsChecked = checkedQuestions[activeStage] && checkedQuestions[activeStage][qi];
      h += '<div class="question-card' + (qIsChecked ? ' q-checked' : '') + '">';
      h += '<div class="q-check" onclick="toggleQuestion(' + activeStage + ',' + qi + ',event)"></div>';
      h += '<div class="q-body"><div class="q-tag"><span class="q-cat ' + qCat + '">' + catLabels[qCat] + '</span></div><p onclick="copyQuestion(this,\'' + esc(qText) + '\',event)">\u201C' + qText + '\u201D</p></div>';
      h += '<span class="copy-hint" onclick="copyQuestion(this,\'' + esc(qText) + '\',event)">Click to copy</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  if (s.exitCriteria.length) {
    h += '<div class="exit-section animate-in delay-4"><h3>Stage Gate \u2014 Exit Criteria</h3><div class="gate-card"><div class="gate-header"><span class="gate-icon">\uD83D\uDEAA</span><span>Must Complete to Advance</span><span class="gate-progress">' + checked + '/' + total + '</span></div><div class="gate-items">';
    s.exitCriteria.forEach((c, ci) => {
      const ck = checkedItems[activeStage] && checkedItems[activeStage][ci];
      h += '<div class="gate-item' + (ck ? ' checked' : '') + '" onclick="toggleCheck(' + activeStage + ',' + ci + ')"><div class="gate-check"></div><span class="gate-text">' + c + '</span></div>';
    });
    h += '</div></div></div>';
  }

  const hasHw = s.hw.length > 0, hasTr = s.transition.length > 0, hasEx = s.example.length > 0;
  if (hasHw || hasTr || hasEx) {
    const cols = [hasHw, hasTr, hasEx].filter(Boolean).length;
    h += '<div class="bottom-row animate-in" style="grid-template-columns:repeat(' + cols + ',1fr);">';
    if (hasHw) h += '<div class="info-card hw"><h4>\uD83D\uDCCC Client Homework</h4><ul class="hw-list">' + s.hw.map(x => '<li>' + x + '</li>').join('') + '</ul></div>';
    if (hasTr) h += '<div class="info-card transition"><h4>\uD83D\uDD04 Transition Language</h4><blockquote>\u201C' + s.transition + '\u201D</blockquote></div>';
    if (hasEx) h += '<div class="info-card example"><h4>\u2705 Strong Rep Summary</h4><blockquote>\u201C' + s.example + '\u201D</blockquote></div>';
    h += '</div>';
  }

  el.innerHTML = h;
}

buildChevrons();
renderStage();
</script>
</body>
</html>

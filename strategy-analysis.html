async function decrypt() {
  const password = document.getElementById('password-input').value;
  if (!password) return;
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('unlock-btn').disabled = true;
  try {
    const raw = atob(ENCRYPTED_DATA.trim());
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    if (new TextDecoder().decode(bytes.slice(0, 8)) !== 'Salted__') throw new Error('Invalid');
    const salt = bytes.slice(8, 16), ciphertext = bytes.slice(16);
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'}, keyMaterial, 384);
    const key = await crypto.subtle.importKey('raw', bits.slice(0,32), {name:'AES-CBC'}, false, ['decrypt']);
    const dec = await crypto.subtle.decrypt({name:'AES-CBC',iv:new Uint8Array(bits.slice(32,48))}, key, ciphertext);
    document.open(); document.write(new TextDecoder().decode(dec)); document.close();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('unlock-btn').disabled = false;
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }
}
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') decrypt(); });
